<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>socials</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            font-family: sans-serif;
            font-size: 3rem;
        }
        #counter {
            position: fixed;
            bottom: 1rem;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <p>lolno</p>
    <div id="counter">loading...</div>
    <script>
        var c = document.getElementById("counter");
        fetch("https://api.counterapi.dev/v1/itsnotyuiiii-socials/visits/up")
            .then(function(r) { return r.json(); })
            .then(function(d) { c.textContent = d.count + " visits"; })
            .catch(function(e) { c.textContent = "error: " + e.message; });
    </script>
</body>
</html>
